name: outputs between steps
on: workflow_dispatch
jobs:
  job_example_outputs:
    runs-on: ubuntu-latest
    steps:
      - name: output generation
        id: step_output_generation
        run: echo "version= 0.0.1" >> $GITHUB_OUTPUT
      - name: reuse output
        run: echo "the output generated by last step is ${{steps.step_output_generation.version}}"
